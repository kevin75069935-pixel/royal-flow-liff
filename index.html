<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>御澤禮賓商務預約表單</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --bg: #f6f2ea;
      --card: #ffffff;
      --black: #111111;
      --gold: #b58a3a;
      --gold-dark: #8a6728;
      --line: #ded6c8;
      --muted: #777777;
      --danger: #b00020;
      --success: #0a7f45;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--black);
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      font-size: 18px;
      line-height: 1.55;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 16px 110px;
    }

    .brand {
      text-align: center;
      padding: 18px 8px 14px;
    }

    .brand-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .brand-sub {
      margin-top: 4px;
      color: var(--gold-dark);
      font-size: 15px;
      letter-spacing: 1px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.05);
    }

    .step-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .step-sub {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 16px 0 7px;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 13px;
      font-size: 18px;
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(181,138,58,0.16);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hidden {
      display: none !important;
    }

    .notice {
      background: #fff9ec;
      border: 1px solid #ead7ac;
      color: #5d4311;
      border-radius: 14px;
      padding: 12px;
      margin-top: 14px;
      font-size: 15px;
    }

    .quote-box {
      background: #111;
      color: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }

    .quote-box strong {
      color: #f5d083;
    }

    .quote-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      padding: 8px 0;
    }

    .quote-line:last-child {
      border-bottom: none;
    }

    .btn {
      border: none;
      border-radius: 14px;
      min-height: 52px;
      padding: 13px 16px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--black);
      color: #fff;
    }

    .btn-gold {
      background: var(--gold);
      color: #fff;
    }

    .btn-light {
      background: #eee7da;
      color: #222;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.96);
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      z-index: 50;
    }

    .status {
      padding: 12px;
      border-radius: 14px;
      margin-top: 12px;
      font-size: 15px;
    }

    .status.success {
      background: #e9f7ef;
      color: var(--success);
      border: 1px solid #bde6cd;
    }

    .status.error {
      background: #fdecef;
      color: var(--danger);
      border: 1px solid #f4b9c2;
    }

    .status.info {
      background: #edf4ff;
      color: #234c82;
      border: 1px solid #c5d9f5;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }

    .progress span {
      height: 7px;
      background: #dfd7ca;
      border-radius: 99px;
    }

    .progress span.active {
      background: var(--gold);
    }

    @media (max-width: 560px) {
      body {
        font-size: 17px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .brand-title {
        font-size: 23px;
      }

      .page {
        padding-left: 12px;
        padding-right: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="brand">
      <div class="brand-title">御澤禮賓商務</div>
      <div class="brand-sub">Royal Flow Concierge｜高端商務車預約</div>
    </div>

    <div class="progress">
      <span id="p1" class="active"></span>
      <span id="p2"></span>
      <span id="p3"></span>
      <span id="p4"></span>
      <span id="p5"></span>
    </div>

    <section id="step1" class="step active card">
      <div class="step-title">1. 貴賓資料</div>
      <div class="step-sub">請填寫聯絡資訊，禮賓專員將依資料協助確認車輛。</div>

      <label>姓名 *</label>
      <input id="name" type="text" placeholder="例：王先生 / Ms. Chen">

      <label>手機 *</label>
      <input id="phone" type="tel" placeholder="例：0912345678">

      <label>LINE 暱稱</label>
      <input id="lineDisplayName" type="text" placeholder="系統將自動帶入，未取得可留空">

      <div id="lineStatus" class="status info">LINE 身分讀取中...</div>
    </section>

    <section id="step2" class="step card">
      <div class="step-title">2. 服務需求</div>
      <div class="step-sub">請選擇服務項目與車型需求。</div>

      <label>服務項目 *</label>
      <select id="service" onchange="handleServiceChange()">
        <option value="">請選擇服務項目</option>
        <option value="機場接送">機場接送</option>
        <option value="商務接送">商務接送 / 商務用車</option>
        <option value="旅遊包車">旅遊包車</option>
        <option value="私人訂製">私人訂製</option>
        <option value="港口接送">港口接送</option>
        <option value="展演活動">展演活動</option>
        <option value="結婚禮車">結婚禮車</option>
        <option value="外交禮賓">外交禮賓</option>
      </select>

      <label>車型需求 *</label>
      <select id="carType">
        <option value="">請選擇車型</option>
        <option value="Lexus LM 40 / 35">Lexus LM 40 / 35</option>
        <option value="Toyota Alphard 40 / 35">Toyota Alphard 40 / 35</option>
        <option value="Toyota Granvia 6/7人座">Toyota Granvia 6/7人座</option>
        <option value="Benz V-Class V300d / V250d">Benz V-Class V300d / V250d</option>
        <option value="Benz Vito 9人座">Benz Vito 9人座</option>
        <option value="Benz Sprinter 旗艦9人座">Benz Sprinter 旗艦9人座</option>
        <option value="VW Crafter 旗艦9人座">VW Crafter 旗艦9人座</option>
        <option value="Lexus ES300h / ES200h">Lexus ES300h / ES200h</option>
        <option value="一般9人座">一般9人座</option>
        <option value="待客服確認">待客服確認</option>
      </select>

      <div class="row">
        <div>
          <label>用車日期 *</label>
          <input id="date" type="date">
        </div>
        <div>
          <label>用車時間 *</label>
          <input id="time" type="time">
        </div>
      </div>

      <div id="tourBlock" class="hidden">
        <label>旅遊型態</label>
        <select id="tourMode" onchange="handleTourModeChange()">
          <option value="套裝旅遊">套裝旅遊</option>
          <option value="客製化旅遊">客製化旅遊</option>
        </select>

        <label>旅遊區域</label>
        <select id="tourArea" onchange="refreshPackageRoutes()">
          <option value="北部">北部</option>
          <option value="中部">中部</option>
          <option value="南部">南部</option>
          <option value="宜花東">宜花東</option>
          <option value="多日遊">多日遊 / 環島</option>
        </select>

        <label>套裝 / 建議路線</label>
        <select id="packageRoute">
          <option value="">請選擇路線</option>
        </select>

        <label>旅遊天數</label>
        <select id="tripDays">
          <option value="1">1 日遊</option>
          <option value="2">2 日遊</option>
          <option value="3">3 日遊</option>
          <option value="5">5 日遊</option>
          <option value="7">7 日遊</option>
        </select>

        <label>司機住宿型態</label>
        <select id="driverHotelType">
          <option value="平日">平日住宿：1500 / 晚</option>
          <option value="假日或連續假期">假日或連續假期：2000 / 晚</option>
          <option value="客戶提供住宿">客戶提供住宿</option>
        </select>

        <div class="notice">
          旅遊包車以套裝行程報價為主；客製化旅遊可使用 Google Routes 估算距離後再由客服確認最終報價。
        </div>
      </div>
    </section>

    <section id="step3" class="step card">
      <div class="step-title">3. 路線資訊</div>
      <div class="step-sub">機場接送可使用機場選單；一般地址可直接輸入。</div>

      <div id="airportBlock" class="hidden">
        <label>上車機場</label>
        <select id="pickupAirport" onchange="syncAirportFields()">
          <option value="">非機場 / 手動輸入</option>
          <option value="TSA 台北松山機場－國內線">TSA 台北松山機場－國內線</option>
          <option value="TSA 台北松山機場－國際線">TSA 台北松山機場－國際線</option>
          <option value="TPE 台北桃園國際機場－第一航廈">TPE 台北桃園國際機場－第一航廈</option>
          <option value="TPE 台北桃園國際機場－第二航廈">TPE 台北桃園國際機場－第二航廈</option>
          <option value="TPE 寰宇商務中心">TPE 寰宇商務中心</option>
          <option value="RMQ 台中國際機場">RMQ 台中國際機場</option>
          <option value="KHH 高雄國際機場 / 小港機場">KHH 高雄國際機場 / 小港機場</option>
        </select>

        <label>下車機場</label>
        <select id="dropoffAirport" onchange="syncAirportFields()">
          <option value="">非機場 / 手動輸入</option>
          <option value="TSA 台北松山機場－國內線">TSA 台北松山機場－國內線</option>
          <option value="TSA 台北松山機場－國際線">TSA 台北松山機場－國際線</option>
          <option value="TPE 台北桃園國際機場－第一航廈">TPE 台北桃園國際機場－第一航廈</option>
          <option value="TPE 台北桃園國際機場－第二航廈">TPE 台北桃園國際機場－第二航廈</option>
          <option value="TPE 寰宇商務中心">TPE 寰宇商務中心</option>
          <option value="RMQ 台中國際機場">RMQ 台中國際機場</option>
          <option value="KHH 高雄國際機場 / 小港機場">KHH 高雄國際機場 / 小港機場</option>
        </select>
      </div>

      <label>上車地點 *</label>
      <input id="pickup" type="text" placeholder="例：台北市信義區某飯店 / 桃園機場第二航廈">

      <label>下車地點 *</label>
      <input id="dropoff" type="text" placeholder="例：台北市信義區市府路45號">

      <label>航班資訊</label>
      <input id="flight" type="text" placeholder="例：BR198 / CI100 / 無">

      <label>停靠點數</label>
      <select id="stopCount">
        <option value="1">1 點上車 / 1 點下車</option>
        <option value="2">2 個停靠點</option>
        <option value="3">3 個停靠點</option>
        <option value="4">4 個停靠點以上</option>
      </select>

      <label>多點 / 行程說明</label>
      <textarea id="multiStopNote" placeholder="例：先到飯店接A客，再到公司接B客，最後前往機場。"></textarea>

      <div class="action-row">
        <button class="btn btn-gold" onclick="getRouteEstimate()">取得 Google Routes 估價</button>
        <button class="btn btn-light" onclick="previewQuote()">預覽目前報價</button>
      </div>

      <div id="routeStatus"></div>
      <div id="quotePreview"></div>
    </section>

    <section id="step4" class="step card">
      <div class="step-title">4. 乘客與加購</div>
      <div class="step-sub">請填寫乘客、行李與加購服務。</div>

      <div class="row">
        <div>
          <label>乘客人數</label>
          <input id="passengers" type="number" min="1" placeholder="例：4">
        </div>
        <div>
          <label>行李件數</label>
          <input id="luggage" type="number" min="0" placeholder="例：2">
        </div>
      </div>

      <label>舉牌服務</label>
      <select id="signService">
        <option value="否">否</option>
        <option value="是">是，NT$200 / 次</option>
      </select>

      <label>英文司機</label>
      <select id="englishDriver">
        <option value="否">否</option>
        <option value="是">是</option>
      </select>

      <label>兒童安全座椅</label>
      <select id="childSeat">
        <option value="否">否</option>
        <option value="是">是</option>
      </select>

      <label>停車費規則</label>
      <select id="parkingNotice">
        <option value="停車費實支實付">未提供免費停車位時，停車費實支實付另計</option>
        <option value="客戶提供停車位">客戶提供免費停車位</option>
      </select>

      <label>其他備註</label>
      <textarea id="note" placeholder="例：需要安靜行程、接待外賓、公司主管、藝人接送、特殊行李等。"></textarea>
    </section>

    <section id="step5" class="step card">
      <div class="step-title">5. 確認送出</div>
      <div class="step-sub">送出後系統會寫入訂單資料表，禮賓專員將再確認最終車輛與費用。</div>

      <div id="finalSummary" class="notice"></div>

      <div class="action-row">
        <button id="submitBtn" class="btn btn-primary" onclick="submitBooking()">送出預約</button>
      </div>

      <div id="submitStatus"></div>
    </section>
  </div>

  <div id="bottomBar" class="bottom-bar">
    <button id="prevBtn" class="btn btn-light" onclick="prevStep()">上一步</button>
    <button id="nextBtn" class="btn btn-primary" onclick="nextStep()">下一步</button>
  </div>

  <script>
    const LIFF_ID = "2010083928-gA1wvCJ0";

    let currentStep = 1;
    let lineUserId = "LINE_NOT_READY";
    let lineDisplayName = "";
    let routeSessionId = "RS_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    let routeEstimateCount = 0;

    let lastDistanceKm = "";
    let lastDurationMin = "";

    const packageRoutes = {
      "北部": [
        "九份十分野柳一日遊",
        "水金九深度之旅",
        "野柳金山十分一日遊",
        "陽明山淡水一日遊",
        "北海岸秘境一日遊",
        "烏來瀑布老街一日遊"
      ],
      "中部": [
        "日月潭清境農場",
        "高美濕地彩虹眷村",
        "溪頭妖怪村",
        "阿里山森林鐵路",
        "清境合歡山"
      ],
      "南部": [
        "墾丁經典一日遊",
        "高雄旗津駁二",
        "台南古都美食",
        "佛光山美濃"
      ],
      "宜花東": [
        "太魯閣七星潭",
        "花東縱谷",
        "伯朗大道",
        "三仙台"
      ],
      "多日遊": [
        "北台灣三日遊",
        "中台灣三日遊",
        "南台灣三日遊",
        "花東三日遊",
        "環島五日遊",
        "環島七日遊"
      ]
    };

    document.addEventListener("DOMContentLoaded", function() {
      initLiff();
      refreshPackageRoutes();
      updateStep();
    });

    async function initLiff() {
      const statusEl = document.getElementById("lineStatus");

      statusEl.className = "status info";
      statusEl.innerText = "LINE 身分讀取中...";

      if (typeof liff === "undefined") {
        lineUserId = "LIFF_SDK_NOT_LOADED";
        statusEl.className = "status error";
        statusEl.innerText = "LIFF SDK 未載入，請確認網路或 LINE LIFF 設定。";
        return;
      }

      try {
        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        if (!liff.isLoggedIn()) {
          liff.login({
            redirectUri: window.location.href
          });
          return;
        }

        const profile = await liff.getProfile();

        lineUserId = profile.userId || "LINE_USER_ID_EMPTY";
        lineDisplayName = profile.displayName || "";

        document.getElementById("lineDisplayName").value = lineDisplayName;

        statusEl.className = "status success";
        statusEl.innerText = "已取得 LINE 身分：" + lineDisplayName;

      } catch (error) {
        lineUserId = "LINE_PROFILE_ERROR";
        statusEl.className = "status error";
        statusEl.innerText = "LINE 身分讀取失敗：" + (error && error.message ? error.message : String(error));
      }
    }

    async function postApi(path, payload) {
      const response = await fetch(path, {
        method: "POST",
        headers: {
          "Content-Type": "application/json;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      return await response.json();
    }

    function handleServiceChange() {
      const service = valueOf("service");
      const tourBlock = document.getElementById("tourBlock");
      const airportBlock = document.getElementById("airportBlock");

      tourBlock.classList.toggle("hidden", service !== "旅遊包車");
      airportBlock.classList.toggle("hidden", service !== "機場接送");

      handleTourModeChange();
    }

    function handleTourModeChange() {
      const service = valueOf("service");
      const tourMode = valueOf("tourMode");

      if (service === "旅遊包車" && tourMode === "套裝旅遊") {
        const route = valueOf("packageRoute");
        if (route) {
          document.getElementById("dropoff").value = route;
        }
      }
    }

    function refreshPackageRoutes() {
      const area = valueOf("tourArea") || "北部";
      const select = document.getElementById("packageRoute");

      select.innerHTML = '<option value="">請選擇路線</option>';

      const list = packageRoutes[area] || [];

      list.forEach(function(route) {
        const option = document.createElement("option");
        option.value = route;
        option.textContent = route;
        select.appendChild(option);
      });

      select.onchange = function() {
        if (valueOf("service") === "旅遊包車") {
          document.getElementById("dropoff").value = valueOf("packageRoute");
        }
      };
    }

    function syncAirportFields() {
      const pickupAirport = valueOf("pickupAirport");
      const dropoffAirport = valueOf("dropoffAirport");

      if (pickupAirport) {
        document.getElementById("pickup").value = pickupAirport;
      }

      if (dropoffAirport) {
        document.getElementById("dropoff").value = dropoffAirport;
      }
    }

    function nextStep() {
      if (!validateStep(currentStep)) {
        return;
      }

      if (currentStep < 5) {
        currentStep++;
        updateStep();
      }
    }

    function prevStep() {
      if (currentStep > 1) {
        currentStep--;
        updateStep();
      }
    }

    function updateStep() {
      for (let i = 1; i <= 5; i++) {
        document.getElementById("step" + i).classList.toggle("active", i === currentStep);
        document.getElementById("p" + i).classList.toggle("active", i <= currentStep);
      }

      document.getElementById("prevBtn").disabled = currentStep === 1;

      if (currentStep === 5) {
        document.getElementById("nextBtn").classList.add("hidden");
        renderFinalSummary();
      } else {
        document.getElementById("nextBtn").classList.remove("hidden");
      }

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function validateStep(step) {
      if (step === 1) {
        if (!valueOf("name")) {
          alert("請填寫姓名");
          return false;
        }

        if (!valueOf("phone")) {
          alert("請填寫手機");
          return false;
        }
      }

      if (step === 2) {
        if (!valueOf("service")) {
          alert("請選擇服務項目");
          return false;
        }

        if (!valueOf("carType")) {
          alert("請選擇車型");
          return false;
        }

        if (!valueOf("date")) {
          alert("請選擇用車日期");
          return false;
        }

        if (!valueOf("time")) {
          alert("請選擇用車時間");
          return false;
        }
      }

      if (step === 3) {
        syncAirportFields();

        if (!valueOf("pickup")) {
          alert("請填寫上車地點");
          return false;
        }

        if (!valueOf("dropoff")) {
          alert("請填寫下車地點");
          return false;
        }
      }

      return true;
    }

    async function getRouteEstimate() {
      syncAirportFields();

      if (!valueOf("pickup") || !valueOf("dropoff")) {
        setStatus("routeStatus", "error", "請先填寫上車與下車地點。");
        return;
      }

      if (routeEstimateCount >= 2) {
        setStatus("routeStatus", "error", "本張預約單已達 2 次估價上限。");
        return;
      }

      routeEstimateCount++;
      setStatus("routeStatus", "info", "Google Routes 估算中，請稍候...");

      try {
        const result = await postApi("/api/estimate", collectData());

        if (!result || result.status !== "success") {
          setStatus("routeStatus", "error", result && result.message ? result.message : "路線估算失敗");
          return;
        }

        lastDistanceKm = result.distanceKm;
        lastDurationMin = result.durationMin;

        setStatus(
          "routeStatus",
          "success",
          "已取得路線：預估 " + result.distanceKm + " 公里，約 " + result.durationMin + " 分鐘。"
        );

        previewQuote();

      } catch (error) {
        setStatus("routeStatus", "error", error && error.message ? error.message : String(error));
      }
    }

    async function previewQuote() {
      setStatus("quotePreview", "info", "報價計算中...");

      try {
        const result = await postApi("/api/quote", collectData());

        if (!result || result.status !== "success") {
          setStatus("quotePreview", "error", result && result.message ? result.message : "報價計算失敗");
          return;
        }

        renderQuote("quotePreview", result.quote);

      } catch (error) {
        setStatus("quotePreview", "error", error && error.message ? error.message : String(error));
      }
    }

    async function submitBooking() {
      if (!validateStep(1) || !validateStep(2) || !validateStep(3)) {
        return;
      }

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerText = "送出中...";

      setStatus("submitStatus", "info", "訂單送出中，請勿關閉畫面。");

      try {
        const result = await postApi("/api/submit", collectData());

        btn.disabled = false;
        btn.innerText = "送出預約";

        if (!result || result.status !== "success") {
          setStatus("submitStatus", "error", result && result.message ? result.message : "送出失敗");
          return;
        }

        setStatus(
          "submitStatus",
          "success",
          "預約成功！訂單編號：" + result.orderId + "，初步報價 NT$ " + result.finalPrice + "。"
        );

      } catch (error) {
        btn.disabled = false;
        btn.innerText = "送出預約";
        setStatus("submitStatus", "error", error && error.message ? error.message : String(error));
      }
    }

    function collectData() {
      syncAirportFields();

      return {
        routeSessionId: routeSessionId,

        lineUserId: lineUserId,
        lineDisplayName: valueOf("lineDisplayName") || lineDisplayName,

        name: valueOf("name"),
        phone: valueOf("phone"),

        service: valueOf("service"),
        date: valueOf("date"),
        time: valueOf("time"),

        pickup: valueOf("pickup"),
        dropoff: valueOf("dropoff"),

        pickupAirport: valueOf("pickupAirport"),
        dropoffAirport: valueOf("dropoffAirport"),

        carType: valueOf("carType"),

        passengers: valueOf("passengers"),
        luggage: valueOf("luggage"),
        flight: valueOf("flight"),

        signService: valueOf("signService"),
        englishDriver: valueOf("englishDriver"),
        childSeat: valueOf("childSeat"),
        parkingNotice: valueOf("parkingNotice"),

        stopCount: valueOf("stopCount"),
        multiStop: Number(valueOf("stopCount") || 1) > 1 ? "有" : "無",
        multiStopNote: valueOf("multiStopNote"),

        tourMode: valueOf("tourMode"),
        tourArea: valueOf("tourArea"),
        packageRoute: valueOf("packageRoute"),
        tripDays: valueOf("tripDays"),
        driverHotelType: valueOf("driverHotelType"),

        note: valueOf("note"),

        distanceKm: lastDistanceKm || "",
        durationMin: lastDurationMin || ""
      };
    }

    function renderFinalSummary() {
      const data = collectData();

      const html =
        "<strong>請確認以下資料：</strong><br><br>" +
        "姓名：" + escapeHtml(data.name) + "<br>" +
        "電話：" + escapeHtml(data.phone) + "<br>" +
        "服務：" + escapeHtml(data.service) + "<br>" +
        "車型：" + escapeHtml(data.carType) + "<br>" +
        "日期時間：" + escapeHtml(data.date + " " + data.time) + "<br>" +
        "上車：" + escapeHtml(data.pickup) + "<br>" +
        "下車：" + escapeHtml(data.dropoff) + "<br>" +
        "乘客 / 行李：" + escapeHtml((data.passengers || "-") + " 人 / " + (data.luggage || "-") + " 件") + "<br>" +
        "備註：" + escapeHtml(data.note || "無") + "<br><br>" +
        "送出後將由禮賓專員確認最終車輛、司機與費用。";

      document.getElementById("finalSummary").innerHTML = html;
    }

    function renderQuote(elementId, quote) {
      const html =
        '<div class="quote-box">' +
          '<div class="quote-line"><span>系統車型</span><strong>' + escapeHtml(quote.carType || "") + '</strong></div>' +
          '<div class="quote-line"><span>預估距離</span><strong>' + escapeHtml(String(quote.distanceKm || "-")) + ' 公里</strong></div>' +
          '<div class="quote-line"><span>預估車程</span><strong>' + escapeHtml(String(quote.durationMin || "-")) + ' 分鐘</strong></div>' +
          '<div class="quote-line"><span>加價說明</span><strong>' + escapeHtml(quote.surchargeNotes || "無") + '</strong></div>' +
          '<div class="quote-line"><span>初步報價</span><strong>NT$ ' + escapeHtml(String(quote.finalPrice || 0)) + '</strong></div>' +
          '<div class="quote-line"><span>建議訂金</span><strong>NT$ ' + escapeHtml(String(quote.depositAmount || 0)) + '</strong></div>' +
          '<div class="quote-line"><span>尾款</span><strong>NT$ ' + escapeHtml(String(quote.balanceAmount || 0)) + '</strong></div>' +
        '</div>';

      document.getElementById(elementId).innerHTML = html;
    }

    function setStatus(elementId, type, message) {
      const el = document.getElementById(elementId);
      el.innerHTML = '<div class="status ' + type + '">' + escapeHtml(message) + '</div>';
    }

    function valueOf(id) {
      const el = document.getElementById(id);
      return el ? String(el.value || "").trim() : "";
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
